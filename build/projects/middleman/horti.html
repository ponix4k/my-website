    <style>
 .project-card {
    margin-top: 20px;
    position: relative;
    isolation: isolate;
    width: 425px;
    height: 225px;
    background-color: #1d1d1f;
    border-radius: 8px;
  }

  .project-card-image {
    display: block;
    width: 100%;
    height: 100%;
    object-position: 0 20%;
    border-radius: inherit;
    transition: transform 250ms;
    background-color: #6c6c6c;
  }

  .pi-text {
    display: grid;
    justify-items: center;
    padding-top: 22%;
    font-size: 2rem;
    text-transform: uppercase;
  }

  .project-card:hover .project-card-image {
    transform: translateX(225px) scale(0.15);
  }

  .project-card-body {
    position: absolute;
    inset: 0;
    z-index: -1;
    display: flex;
    padding: 24px;
    color: #f4c644;
  }

  .project-card-category {
    color: #efefef;
  }

  .project-card-button {
    position: absolute;
    z-index: -1;
    bottom: 15px;
    right: 15px;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 4px;
    background-color: #f4c644;
    color: #000;
  }
</style>

<div class="project-card">
  <div class="project-card-image"><div class="pi-text"></div></div>
  <div class="project-card-body">
    <h2 class="project-card-category">Horti</h2>
    <p class="project-card-short-description">A static page to show information about various trees and plants</p><br>
    <p class="">Status: Work in progress</p><br>
    <p class="">Last Update: 2022-12-01</p>

    <a href="https://github.com/ponix4k/horti" class="project-card-button">> here <</a>
  </div>
